<!doctype html>
<html><head><meta charset="utf-8"><title>Page Dots</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--pagali-purple);padding:40px;color:#fff;display:grid;place-items:center;height:100px;}
  .dots{display:flex;gap:6px;align-items:center;}
  .dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.26);}
  .dot.active{background:#fff;border-radius:25px;}
</style></head>
<body>
<div class="dots">
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>
</body></html>
