<!doctype html>
<html><head><meta charset="utf-8"><title>Bottom Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#f0eef4;padding:16px;}
  .nav{background:#424242;color:#fff;border-radius:var(--r-lg);padding:10px;display:flex;justify-content:space-around;align-items:center;max-width:520px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border-radius:var(--r-md);font-size:11px;opacity:.6;}
  .item.active{background:var(--pagali-purple);opacity:1;}
  .ico{width:22px;height:22px;display:grid;place-items:center;font-size:18px;}
  .qr-fab{background:var(--pagali-lime);color:#1a1a1a;width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:22px;font-weight:700;margin-top:-22px;box-shadow:0 6px 16px rgba(180,191,9,.5);}
</style></head>
<body>
<div class="nav">
  <div class="item active"><div class="ico">⌂</div>Início</div>
  <div class="item"><div class="ico">↻</div>Histórico</div>
  <div class="qr-fab">▦</div>
  <div class="item"><div class="ico">◷</div>Cartões</div>
  <div class="item"><div class="ico">☰</div>Mais</div>
</div>
</body></html>
