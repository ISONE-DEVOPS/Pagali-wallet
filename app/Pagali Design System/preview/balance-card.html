<!doctype html>
<html><head><meta charset="utf-8"><title>Balance Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#f0eef4;padding:24px;}
  .card{background:linear-gradient(135deg,var(--pagali-purple) 0%,#7843b8 100%);color:#fff;border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-purple);max-width:560px;}
  .label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;opacity:.75;}
  .amount{font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1;margin:8px 0 4px;font-feature-settings:'tnum';}
  .cur{font-size:14px;opacity:.8;letter-spacing:.06em;font-weight:500;}
  .row{display:flex;gap:10px;margin-top:18px;}
  .pill{background:rgba(255,255,255,.18);border-radius:var(--r-pill);padding:8px 14px;font-size:13px;font-weight:500;}
</style></head>
<body>
<div class="card">
  <div class="label">Saldo disponível</div>
  <div class="amount">5&nbsp;320,00 <span class="cur">CVE</span></div>
  <div style="font-size:13px;opacity:.8">•••• 8821 · Ana Silva</div>
  <div class="row">
    <span class="pill">+ Adicionar</span>
    <span class="pill">↗ Enviar</span>
    <span class="pill">⌘ Pedir</span>
  </div>
</div>
</body></html>
