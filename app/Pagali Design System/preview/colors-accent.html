<!doctype html>
<html><head><meta charset="utf-8"><title>Accent Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fafafa;padding:20px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .swatch{border-radius:var(--r-md);padding:18px;height:130px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-1);}
  .swatch .name{font-weight:700;font-size:14px;}
  .swatch .hex{font-size:12px;font-family:ui-monospace,Menlo,monospace;opacity:.85;}
  .swatch .role{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.75;}
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--pagali-lime);color:#1a1a1a;">
    <div class="role">CTA Accent</div>
    <div><div class="name">Pagali Lime</div><div class="hex">#B4BF09</div></div>
  </div>
  <div class="swatch" style="background:var(--pagali-lime-700);color:#fff;">
    <div class="role">Press</div>
    <div><div class="name">Lime 700</div><div class="hex">#909808</div></div>
  </div>
  <div class="swatch" style="background:var(--pagali-pink);color:#3a1f1f;">
    <div class="role">Soft Accent</div>
    <div><div class="name">Subscribe Pink</div><div class="hex">#FFABAB</div></div>
  </div>
  <div class="swatch" style="background:var(--pagali-blue-link);color:#fff;">
    <div class="role">Link</div>
    <div><div class="name">Link Blue</div><div class="hex">#0169A6</div></div>
  </div>
</div>
</body></html>
