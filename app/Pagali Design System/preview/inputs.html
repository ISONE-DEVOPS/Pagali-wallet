<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px;color:var(--fg-default);}
  .col{display:flex;flex-direction:column;gap:14px;max-width:420px;}
  label{font-size:13px;color:var(--fg-muted);font-weight:500;display:block;margin-bottom:6px;}
  .field{position:relative;}
  .field input{width:100%;box-sizing:border-box;padding:14px 16px;font:400 16px var(--font-sans);border:1.5px solid #00000018;background:#fff;border-radius:var(--r-md);outline:none;color:var(--fg-default);transition:border-color .15s;}
  .field input:focus{border-color:var(--pagali-purple);}
  .field-amount{display:flex;align-items:baseline;gap:8px;background:var(--pagali-purple-50);border-radius:var(--r-md);padding:14px 18px;}
  .field-amount input{flex:1;border:0;background:transparent;font:700 28px/1 var(--font-sans);color:var(--pagali-purple);outline:none;font-feature-settings:'tnum';width:100%;}
  .field-amount .cur{font-weight:500;color:var(--pagali-purple);font-size:14px;letter-spacing:.06em;}
</style></head>
<body>
<div class="col">
  <div><label>Número de telemóvel</label>
    <div class="field"><input type="text" value="+238 989 0001"></div>
  </div>
  <div><label>Montante</label>
    <div class="field-amount"><span class="cur">CVE</span><input type="text" value="2 500"></div>
  </div>
</div>
</body></html>
