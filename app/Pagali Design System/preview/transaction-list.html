<!doctype html>
<html><head><meta charset="utf-8"><title>Transaction Row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:18px;}
  .list{background:#fff;border-radius:var(--r-md);box-shadow:var(--shadow-1);overflow:hidden;max-width:560px;}
  .row{display:grid;grid-template-columns:42px 1fr auto;gap:14px;align-items:center;padding:14px 16px;border-bottom:1px solid #00000010;}
  .row:last-child{border-bottom:0;}
  .ico{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:18px;}
  .ico.in{background:#E0F8EF;color:#0E8B66;}
  .ico.out{background:var(--pagali-purple-50);color:var(--pagali-purple);}
  .ico.qr{background:#FFF1D8;color:#A66800;}
  .name{font-size:15px;font-weight:500;color:var(--fg-default);}
  .meta{font-size:12px;color:var(--fg-light);margin-top:2px;}
  .amt{font-size:15px;font-weight:700;font-feature-settings:'tnum';}
  .amt.in{color:#0E8B66;}
</style></head>
<body>
<div class="list">
  <div class="row">
    <div class="ico in">↓</div>
    <div><div class="name">João Monteiro</div><div class="meta">Recebido · há 2 min</div></div>
    <div class="amt in">+1&nbsp;500,00</div>
  </div>
  <div class="row">
    <div class="ico qr">▦</div>
    <div><div class="name">Restaurante Sodade</div><div class="meta">QR · Mindelo</div></div>
    <div class="amt">−850,00</div>
  </div>
  <div class="row">
    <div class="ico out">↑</div>
    <div><div class="name">Maria Tavares</div><div class="meta">Enviado · ontem</div></div>
    <div class="amt">−2&nbsp;000,00</div>
  </div>
</div>
</body></html>
