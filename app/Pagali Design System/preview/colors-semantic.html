<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fafafa;padding:20px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .swatch{border-radius:var(--r-md);padding:18px;height:130px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-1);}
  .swatch .name{font-weight:700;font-size:14px;}
  .swatch .hex{font-size:12px;font-family:ui-monospace,Menlo,monospace;opacity:.85;}
  .swatch .role{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.85;}
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--color-success);color:#003827;">
    <div class="role">Success</div><div><div class="name">Confirmed</div><div class="hex">#2BD9A8</div></div>
  </div>
  <div class="swatch" style="background:var(--color-warning);color:#3a2300;">
    <div class="role">Warning</div><div><div class="name">Pending</div><div class="hex">#FFC857</div></div>
  </div>
  <div class="swatch" style="background:var(--color-danger);color:#fff;">
    <div class="role">Danger</div><div><div class="name">Failed</div><div class="hex">#E5484D</div></div>
  </div>
  <div class="swatch" style="background:var(--color-info);color:#fff;">
    <div class="role">Info / Link</div><div><div class="name">Link</div><div class="hex">#0169A6</div></div>
  </div>
</div>
</body></html>
