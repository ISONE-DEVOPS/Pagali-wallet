<!doctype html>
<html><head><meta charset="utf-8"><title>Type Specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px;color:var(--fg-default);}
  .name{font-weight:900;font-size:84px;line-height:.95;letter-spacing:-0.03em;}
  .meta{font-size:11px;font-family:ui-monospace,Menlo,monospace;color:var(--fg-light);text-transform:uppercase;letter-spacing:.08em;margin-top:14px;}
  .weights{display:flex;gap:18px;margin-top:14px;align-items:baseline;flex-wrap:wrap;}
  .w{font-size:18px;}
  .w small{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-light);font-weight:400;margin-top:2px;font-family:ui-monospace,Menlo,monospace;}
</style></head>
<body>
  <div class="name">Roboto</div>
  <div class="meta">Primary typeface · Google Fonts</div>
  <div class="weights">
    <div class="w" style="font-weight:300">Aa Bb Cc 0123<small>Light · 300</small></div>
    <div class="w" style="font-weight:400">Aa Bb Cc 0123<small>Regular · 400</small></div>
    <div class="w" style="font-weight:500">Aa Bb Cc 0123<small>Medium · 500</small></div>
    <div class="w" style="font-weight:700">Aa Bb Cc 0123<small>Bold · 700</small></div>
    <div class="w" style="font-weight:900">Aa Bb Cc 0123<small>Black · 900</small></div>
  </div>
</body></html>
