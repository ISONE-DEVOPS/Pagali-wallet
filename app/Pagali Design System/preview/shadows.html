<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#f4f4f6;padding:32px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:120px;height:80px;background:#fff;border-radius:var(--r-md);}
  .tok{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--fg-muted);}
  .label{font-size:11px;color:var(--fg-light);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-1)"></div><div class="tok">--shadow-1</div><div class="label">subtle · 1px</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-2)"></div><div class="tok">--shadow-2</div><div class="label">card · 4px</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-3)"></div><div class="tok">--shadow-3</div><div class="label">modal · 12px</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-purple)"></div><div class="tok">--shadow-purple</div><div class="label">brand glow</div></div>
</div>
</body></html>
