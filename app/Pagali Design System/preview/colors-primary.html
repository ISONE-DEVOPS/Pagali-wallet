<!doctype html>
<html><head><meta charset="utf-8"><title>Brand Color</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fafafa;padding:20px;}
  .row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:12px;}
  .swatch{border-radius:var(--r-md);padding:18px;height:130px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-1);}
  .swatch .name{font-weight:700;font-size:14px;}
  .swatch .hex{font-size:12px;font-family:ui-monospace,Menlo,monospace;opacity:.85;}
  .swatch .role{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.75;}
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--pagali-purple);color:#fff;">
    <div class="role">Primary</div>
    <div><div class="name">Pagali Purple</div><div class="hex">#6233A0</div></div>
  </div>
  <div class="swatch" style="background:var(--pagali-purple-700);color:#fff;">
    <div class="role">Press</div>
    <div><div class="name">Purple 700</div><div class="hex">#4F2A82</div></div>
  </div>
  <div class="swatch" style="background:var(--pagali-purple-300);color:#fff;">
    <div class="role">Hover</div>
    <div><div class="name">Purple 300</div><div class="hex">#8E6BBF</div></div>
  </div>
  <div class="swatch" style="background:var(--pagali-purple-50);color:var(--pagali-purple);">
    <div class="role">Tint</div>
    <div><div class="name">Purple 50</div><div class="hex">#F1ECF8</div></div>
  </div>
</div>
</body></html>
