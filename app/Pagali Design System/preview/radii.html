<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px;}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .box{width:78px;height:78px;background:var(--pagali-purple-50);border:2px solid var(--pagali-purple);}
  .tok{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--fg-muted);}
  .px{font-size:11px;color:var(--fg-light);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><div class="tok">--r-xs</div><div class="px">6 px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><div class="tok">--r-sm</div><div class="px">10 px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="tok">--r-md</div><div class="px">14 px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="tok">--r-lg</div><div class="px">20 px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-pill);width:140px;"></div><div class="tok">--r-pill</div><div class="px">25 px · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-full)"></div><div class="tok">--r-full</div><div class="px">999 · avatar</div></div>
</div>
</body></html>
