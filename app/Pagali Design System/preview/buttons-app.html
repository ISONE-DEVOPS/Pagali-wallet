<!doctype html>
<html><head><meta charset="utf-8"><title>App Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:32px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .btn{border:0;cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;border-radius:var(--r-pill);padding:14px 28px;transition:all .12s ease;}
  .btn-primary{background:var(--pagali-purple);color:#fff;box-shadow:var(--shadow-purple);}
  .btn-primary:hover{background:var(--pagali-purple-700);}
  .btn-secondary{background:var(--pagali-lime);color:#1a1a1a;}
  .btn-tertiary{background:var(--pagali-purple-50);color:var(--pagali-purple);}
  .btn-link{background:transparent;color:var(--pagali-blue-link);text-decoration:underline;padding:14px 8px;}
  .btn-icon{display:inline-flex;align-items:center;gap:8px;}
</style></head>
<body>
<div class="row">
  <button class="btn btn-primary">Enviar dinheiro</button>
  <button class="btn btn-secondary btn-icon">+ Adicionar saldo</button>
  <button class="btn btn-tertiary">Ver histórico</button>
  <button class="btn btn-link">Esqueci a palavra-passe</button>
</div>
</body></html>
