<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;height:280px;}
  .panel{display:grid;place-items:center;padding:20px;}
  .panel.purple{background:var(--pagali-purple);}
  .panel.light{background:#fff;}
  .panel img{max-width:75%;height:auto;}
  .meta{position:absolute;font-size:10px;font-family:ui-monospace,Menlo,monospace;color:var(--fg-light);text-transform:uppercase;letter-spacing:.08em;}
</style></head>
<body>
<div class="panel purple"><img src="../assets/images/pagali.png" alt="Pagali wordmark"></div>
<div class="panel light"><img src="../assets/images/pagali.png" alt="Pagali wordmark" style="filter:invert(18%) sepia(85%) saturate(2300%) hue-rotate(258deg) brightness(75%) contrast(95%);"></div>
</body></html>
