<!doctype html>
<html><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px;color:var(--fg-default);}
  .row{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:baseline;padding:8px 0;border-bottom:1px solid #00000010;}
  .meta{font-size:11px;font-family:ui-monospace,Menlo,monospace;color:var(--fg-light);text-transform:uppercase;letter-spacing:.06em;}
  .row:last-child{border-bottom:0;}
</style></head>
<body>
  <div class="row"><div class="meta">Display · 32 / 700</div><div style="font-size:32px;font-weight:700;line-height:1.1;letter-spacing:-0.01em;">5 320,00 CVE</div></div>
  <div class="row"><div class="meta">H1 · 28 / 700</div><div style="font-size:28px;font-weight:700;line-height:1.2;">Bem-vindo de volta</div></div>
  <div class="row"><div class="meta">H2 · 24 / 400</div><div style="font-size:24px;font-weight:400;line-height:1;">Fazer Pagamentos</div></div>
  <div class="row"><div class="meta">H3 · 20 / 500</div><div style="font-size:20px;font-weight:500;line-height:1.25;">Restaurante Sodade</div></div>
  <div class="row"><div class="meta">Body · 16 / 400</div><div style="font-size:16px;line-height:1.45;">Pague todas as suas contas em um único local. Sem fila e sem stress.</div></div>
  <div class="row"><div class="meta">Caption · 12 / 400</div><div style="font-size:12px;line-height:1.4;color:var(--fg-light);">há 2 minutos · Mindelo</div></div>
</body></html>
