<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px;color:var(--fg-default);}
  .row{display:flex;flex-direction:column;gap:8px;}
  .item{display:grid;grid-template-columns:80px 60px 1fr;gap:12px;align-items:center;}
  .item .tok{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--fg-muted);}
  .item .px{font-size:13px;color:var(--fg-light);}
  .bar{height:14px;background:var(--pagali-purple);border-radius:3px;}
</style></head>
<body>
<div class="row">
  <div class="item"><span class="tok">--s-1</span><span class="px">4 px</span><span class="bar" style="width:4px"></span></div>
  <div class="item"><span class="tok">--s-2</span><span class="px">8 px</span><span class="bar" style="width:8px"></span></div>
  <div class="item"><span class="tok">--s-3</span><span class="px">12 px</span><span class="bar" style="width:12px"></span></div>
  <div class="item"><span class="tok">--s-4</span><span class="px">16 px</span><span class="bar" style="width:16px"></span></div>
  <div class="item"><span class="tok">--s-5</span><span class="px">20 px</span><span class="bar" style="width:20px"></span></div>
  <div class="item"><span class="tok">--s-6</span><span class="px">24 px</span><span class="bar" style="width:24px"></span></div>
  <div class="item"><span class="tok">--s-8</span><span class="px">32 px</span><span class="bar" style="width:32px"></span></div>
  <div class="item"><span class="tok">--s-10</span><span class="px">40 px</span><span class="bar" style="width:40px"></span></div>
  <div class="item"><span class="tok">--s-12</span><span class="px">48 px</span><span class="bar" style="width:48px"></span></div>
  <div class="item"><span class="tok">--s-16</span><span class="px">64 px</span><span class="bar" style="width:64px"></span></div>
</div>
</body></html>
