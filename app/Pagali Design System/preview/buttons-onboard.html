<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--pagali-purple);padding:32px;color:#fff;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .btn{border:0;cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;border-radius:var(--r-pill);padding:14px 28px;transition:all .12s ease;}
  .btn-lime{background:var(--pagali-lime);color:#1a1a1a;}
  .btn-lime:hover{background:var(--pagali-lime-700);color:#fff;}
  .btn-white{background:#fff;color:var(--pagali-purple);}
  .btn-ghost{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.6);padding:12px 26px;}
  .btn-disabled{background:var(--pagali-lime);color:#1a1a1a;opacity:.45;cursor:not-allowed;}
</style></head>
<body>
<div class="row">
  <button class="btn btn-lime">Iniciar</button>
  <button class="btn btn-white">Próximo</button>
  <button class="btn btn-ghost">Saltar</button>
  <button class="btn btn-disabled">Aguardar...</button>
</div>
</body></html>
